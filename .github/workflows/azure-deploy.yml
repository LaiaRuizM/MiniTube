# .github/workflows/azure-deploy.yml
#
# This workflow runs every time you push to the main branch.
# It builds the MiniTube ASP.NET Core app and deploys it to Azure App Service.
#
# Required GitHub Secret:
#   AZURE_WEBAPP_PUBLISH_PROFILE  — download from Azure Portal > App Service > "Download publish profile"

name: Build and Deploy MiniTube to Azure

# When does this workflow run?
on:
  push:
    branches:
      - main          # Only deploy when main branch changes
  workflow_dispatch:  # Also allows manual trigger from the GitHub Actions tab

# What the workflow does
jobs:
  build-and-deploy:
    runs-on: windows-latest   # Use a Windows runner (matches Azure Windows App Service)

    steps:
      # Step 1: Check out your code onto the runner machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install .NET 8 SDK on the runner
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3: Compile and publish the app
      # "dotnet publish" compiles your code, resolves dependencies,
      # and creates a self-contained output folder ready to deploy.
      - name: Build and publish
        run: dotnet publish MiniTube.csproj --configuration Release --output ./publish

      # Step 4: Deploy the published output to Azure App Service
      # This step uses the publish profile secret to authenticate with Azure.
      # It uploads everything in ./publish to your App Service.
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'minitube-laia'   # CHANGE THIS to your actual App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
