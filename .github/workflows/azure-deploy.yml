name: Build and Deploy MiniTube to Azure

# When does this workflow run?
on:
  push:
    branches:
      - main          # Only deploy when main branch changes
  workflow_dispatch:  # Also allows manual trigger from the GitHub Actions tab

# What the workflow does
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # Use a Linux runner (matches Azure Linux App Service)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish
        run: dotnet publish MiniTube.csproj --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'minitube-laia'  
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
